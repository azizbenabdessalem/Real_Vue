<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vue@3"></script>
</head>
<body>

<div id="app">

<input type="text" v-model="name">
<p>{{ name }}</p>

</div>

<script>
Vue.createApp({
  data(){
    return{
      name:"Ali"
    }
  }
}).mount("#app")
</script>

</body>
</html>

👉 v-model crée une liaison bidirectionnelle (2-way binding)
entre l’input HTML et la data Vue
