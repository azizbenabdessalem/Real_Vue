<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vue@3"></script>
</head>
<body>

<div id="app">

<!-- component avec v-model -->
<custom-input v-model="inputValue"></custom-input>

<p>Entered Value: {{ inputValue }}</p>

</div>

<script>

// component
const CustomInput = {
  props: ['modelValue'],
  template: `
    <div>
      <input v-bind:value="modelValue" @input="updateValue($event)">
    </div>
  `,
  methods:{
    updateValue(event){
      this.$emit('update:modelValue', event.target.value)
    }
  }
}

// app
const app = Vue.createApp({
  data(){
    return{
      inputValue: ""
    }
  }
})

app.component("custom-input", CustomInput)

app.mount("#app")

</script>

</body>
</html>

👉 Oui exactement ce que tu dis :

"input c’est pour le parent et model pour l’enfant"

✔️ MAIS encore plus précis :

inputValue = ta variable perso (parent)
modelValue = nom imposé par Vue pour v-model dans l’enfant
