<!DOCTYPE html>
<html>
<head>
  <title>Vue Example</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

<div id="app">
  <h2>{{ user.name }}</h2>
  <p>Age: {{ user.age }}</p>
  <p>Status: {{ status }}</p>
  <p>Birth Year: {{ birthYear }}</p>

  <button @click="update(22)">Update Age</button>
</div>

<script>
const app = Vue.createApp({
  data() {
    return {
      user: {
        name: "John",
        age: 16
      }
    }
  },

  methods: {
    update(newAge) {
      this.user.age = newAge
    }
  },

  computed: {
    status() {
      return this.user.age > 18 ? "adult" : "minor"
    },

    birthYear() {
      return new Date().getFullYear() - this.user.age
    }
  }
})

app.mount("#app")
</script>

</body>
</html>
