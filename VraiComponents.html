<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vue@3"></script>
</head>
<body>

<div id="app">
  <my-component></my-component>
</div>

<script>

// component
const MyComponent = {
  data(){
    return{
      message: "Hello from component"
    }
  },
  template: `<p>{{ message }}</p>`
}

// app
const app = Vue.createApp({})

// enregistrer le component
app.component("my-component", MyComponent)

app.mount("#app")

</script>

</body>
</html>
