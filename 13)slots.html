<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vue@3"></script>
</head>
<body>

<div id="app">

  <my-card v-slot:default>
    <p>Hello inside slot</p>    (ici le le "Hello inside slot" va aller à l'intérieur de <slot> </slot>
  </my-card>

</div>

<script>

const MyCard = {
  template: `
    <div>
      <h3>Card</h3>
      <slot></slot>
    </div>
  `
}

const app = Vue.createApp({})
app.component("my-card", MyCard)
app.mount("#app")

</script>

</body>
</html>
